<html lang="pt">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:#2563EB; --blue-lt:#EFF6FF; --green:#16A34A;
      --gray-50:#F9FAFB; --gray-100:#F3F4F6; --gray-200:#E5E7EB;
      --gray-400:#9CA3AF; --gray-600:#4B5563; --gray-800:#1F2937;
      --radius:10px; --shadow:0 1px 4px rgba(0,0,0,.08);
    }
    html { scroll-behavior: smooth; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: var(--gray-50); color: var(--gray-800); font-size: 16px; line-height: 1.6; padding-bottom: 60px; }

    /* LANG SWITCHER */
    .lang-bar { background: #fff; border-bottom: 1px solid var(--gray-200); padding: 10px 20px; display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; position: sticky; top: 0; z-index: 50; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .lang-btn { border: 1.5px solid var(--gray-200); background: var(--gray-50); border-radius: 20px; padding: 5px 12px; font-size: 0.82rem; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all .15s; font-family: inherit; }
    .lang-btn:hover { border-color: var(--blue); color: var(--blue); }
    .lang-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); font-weight: 700; }

    /* HEADER */
    .progress-bar-wrap { background: var(--gray-200); height: 4px; }
    .progress-bar { background: var(--blue); height: 4px; width: 0%; transition: width .4s; }
    .header { background: #fff; border-bottom: 3px solid var(--blue); padding: 32px 20px 24px; text-align: center; }
    .header-icon { font-size: 38px; margin-bottom: 10px; }
    .header h1 { font-size: 1.5rem; font-weight: 800; color: var(--gray-800); margin-bottom: 8px; }
    .header p { font-size: .95rem; color: var(--gray-600); max-width: 560px; margin: 0 auto 14px; }
    .header-meta { display: inline-flex; gap: 16px; flex-wrap: wrap; justify-content: center; font-size: .83rem; color: var(--gray-600); }
    .header-meta span { display: flex; align-items: center; gap: 4px; }

    /* SECTIONS */
    .container { max-width: 680px; margin: 0 auto; padding: 0 16px; }
    .section { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); margin-top: 24px; overflow: hidden; }
    .section-header { background: var(--blue-lt); border-left: 4px solid var(--blue); padding: 12px 20px; }
    .section-header h2 { font-size: .78rem; font-weight: 700; letter-spacing: .8px; color: var(--blue); text-transform: uppercase; }
    .section-header p { font-size: .84rem; color: var(--gray-600); margin-top: 2px; }
    .section-body { padding: 6px 20px 18px; }

    /* QUESTIONS */
    .question { margin-top: 18px; }
    .question label.q-label { display: block; font-size: .94rem; font-weight: 600; color: var(--gray-800); margin-bottom: 10px; }
    .q-number { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; background: var(--blue); color: #fff; border-radius: 50%; font-size: .7rem; font-weight: 700; margin-right: 7px; flex-shrink: 0; vertical-align: middle; }
    .optional { font-size: .75rem; color: var(--gray-400); font-weight: 400; margin-left: 5px; }

    /* OPTIONS */
    .options-grid { display: flex; flex-direction: column; gap: 8px; }
    .options-grid.cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .opt-card input { position: absolute; opacity: 0; width: 0; height: 0; }
    .opt-card label { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 1.5px solid var(--gray-200); border-radius: 8px; cursor: pointer; font-size: .89rem; color: var(--gray-800); transition: border-color .15s, background .15s; background: var(--gray-50); }
    .opt-card label:hover { border-color: var(--blue); background: var(--blue-lt); }
    .opt-card input:checked + label { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); font-weight: 600; }
    .opt-card label::before { content: ''; width: 16px; height: 16px; border: 2px solid var(--gray-400); border-radius: 50%; flex-shrink: 0; transition: border-color .15s; }
    .opt-card input:checked + label::before { border-color: var(--blue); background: var(--blue); box-shadow: inset 0 0 0 3px #fff; }

    /* TAGS */
    .tags-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-opt input { position: absolute; opacity: 0; width: 0; height: 0; }
    .tag-opt label { display: inline-block; padding: 7px 13px; border: 1.5px solid var(--gray-200); border-radius: 20px; cursor: pointer; font-size: .87rem; color: var(--gray-700); background: var(--gray-50); transition: all .15s; user-select: none; }
    .tag-opt label:hover { border-color: var(--blue); color: var(--blue); }
    .tag-opt input:checked + label { border-color: var(--blue); background: var(--blue); color: #fff; font-weight: 600; }

    /* TEXTAREA & EMAIL INPUT */
    .q-textarea, .q-input { width: 100%; border: 1.5px solid var(--gray-200); border-radius: 8px; padding: 11px 13px; font-size: .9rem; font-family: inherit; color: var(--gray-800); background: var(--gray-50); transition: border-color .15s; }
    .q-textarea { resize: vertical; min-height: 88px; }
    .q-textarea:focus, .q-input:focus { outline: none; border-color: var(--blue); background: #fff; }
    .email-note { font-size: .78rem; color: var(--gray-400); margin-top: 7px; }

    .divider { border: none; border-top: 1px solid var(--gray-200); margin: 16px 0 0; }

    /* SUBMIT */
    .submit-wrap { margin-top: 28px; text-align: center; }
    .btn-submit { display: inline-block; background: var(--blue); color: #fff; font-size: 1rem; font-weight: 700; padding: 15px 46px; border: none; border-radius: 50px; cursor: pointer; transition: background .15s, transform .1s; box-shadow: 0 4px 14px rgba(37,99,235,.3); }
    .btn-submit:hover { background: #1d4ed8; transform: translateY(-1px); }
    .submit-note { font-size: .78rem; color: var(--gray-400); margin-top: 10px; }

    /* THANK YOU */
    #thankyou { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); align-items: center; justify-content: center; z-index: 100; }
    #thankyou.show { display: flex; }
    .ty-card { background: #fff; border-radius: 16px; padding: 40px 32px; max-width: 380px; text-align: center; margin: 16px; }
    .ty-card .ty-icon { font-size: 52px; margin-bottom: 14px; }
    .ty-card h2 { font-size: 1.35rem; font-weight: 800; margin-bottom: 8px; }
    .ty-card p { color: var(--gray-600); font-size: .9rem; line-height: 1.6; }

    /* GFORMS */
    .gforms-guide { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); margin-top: 24px; padding: 22px 20px; border-left: 4px solid #34A853; }
    .gforms-guide h3 { color: #188038; font-size: .84rem; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; margin-bottom: 10px; }
    .gforms-guide ol { padding-left: 18px; font-size: .86rem; color: var(--gray-700); line-height: 2; }
    .gforms-guide a { color: var(--blue); }

    @media (max-width: 480px) {
      .header h1 { font-size: 1.2rem; }
      .options-grid.cols-2 { grid-template-columns: 1fr; }
      .btn-submit { padding: 13px 28px; }
      .lang-btn { font-size: .78rem; padding: 4px 10px; }
    }
  </style>
</head>

let currentLang = 'pt';

function setLang(lang) {
  if (!T[lang]) return;
  currentLang = lang;
  document.getElementById('hidden_lang').value = lang;

  // Update lang buttons
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('lb-' + lang);
  if (btn) btn.classList.add('active');

  // Update html lang attribute
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang;

  const d = T[lang];

  // Update all data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (d[key] !== undefined) el.innerHTML = d[key];
  });

  // Update textarea placeholders
  document.querySelectorAll('textarea[data-ph]').forEach(el => {
    const key = el.getAttribute('data-ph');
    if (d[key]) el.placeholder = d[key];
  });

  // Update email input placeholder
  const emailInput = document.getElementById('email_input');
  if (emailInput && d.se_ph) emailInput.placeholder = d.se_ph;

  // Update submit button data-i18n (btn)
  const submitBtn = document.getElementById('submitBtn');
  if (submitBtn && d.btn) submitBtn.innerHTML = d.btn;
}

// Auto-detect browser language on load
window.addEventListener('DOMContentLoaded', () => {
  const nav = (navigator.language || 'pt').toLowerCase().slice(0, 2);
  const supported = ['pt', 'en', 'es', 'fr', 'de', 'zh'];
  setLang(supported.includes(nav) ? nav : 'pt');

  // Restore from localStorage if user changed previously
  const saved = localStorage.getItem('nexus_q_lang');
  if (saved && supported.includes(saved)) setLang(saved);
});

// Save lang choice
document.querySelectorAll('.lang-btn').forEach(b => {
  b.addEventListener('click', () => {
    localStorage.setItem('nexus_q_lang', currentLang);
  });
});

// Progress bar
window.addEventListener('scroll', () => {
  const doc = document.documentElement;
  const pct = doc.scrollTop / (doc.scrollHeight - doc.clientHeight) * 100;
  document.getElementById('progressBar').style.width = Math.min(pct, 100) + '%';
});

// Form submit
const form = document.getElementById('surveyForm');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const d = T[currentLang] || T.pt;
  const btn = document.getElementById('submitBtn');
  btn.innerHTML = d.btn_sending || 'Sending…';
  btn.disabled = true;

  if (form.action.includes('COLOCA_AQUI')) {
    document.getElementById('thankyou').classList.add('show');
    return;
  }

  try {
    const res = await fetch(form.action, {
      method: 'POST', body: new FormData(form), headers: { Accept: 'application/json' }
    });
    if (res.ok) {
      document.getElementById('thankyou').classList.add('show');
    } else {
      btn.innerHTML = d.btn_error || 'Error';
      btn.disabled = false;
    }
  } catch {
    btn.innerHTML = d.btn_error || 'Error';
    btn.disabled = false;
  }
});

document.getElementById('thankyou').addEventListener('click', () => {
  document.getElementById('thankyou').classList.remove('show');
});
</script>
